name: Test Access

on:
  push:
    branches:
      - dev
    paths:
      - 'aws/2026/05/static-web-sre/src/environments/dev/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ROLE_ARN: arn:aws:iam::345003923266:role/github_action-dev_branch
  WORKING_DIR: aws/2026/05/static-web-sre/src/environments/dev/

jobs:
  start-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # Git 저장소 가져오기
      - name: Checkout repository
        uses: actions/checkout@v7

      # 현재 사용중인 IAM Role 보여주기
      - name: Show IAM Role
        uses: ./.github/actions/show-iam-role
        with:
          role-arn: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: S3 API test(Head-Object)
        id: s3api_test-head_object
        run: aws s3api head-object --bucket lee-static-web-sre-state-storage --key dev/state.tfstate
        continue-on-error: true

      - name: S3 API test(Get-Bucket)
        id: s3api_test-get_bucket
        run: aws s3api get-bucket-location --bucket lee-static-web-sre-state-storage
        continue-on-error: true

      - name: S3 API test(List-Object-v2)
        id: s3api_test-list_objects-v2
        run: aws s3api list-objects-v2 --bucket lee-static-web-sre-state-storage --prefix dev/
        continue-on-error: true

      - name: S3 test(ls)
        id: s3-ls
        run: aws s3 ls lee-static-web-sre-state-storage/dev/
        continue-on-error: true

      - name: S3 test (cp)
        id: s3-cp
        run: echo testing > test.txt && aws s3 cp test.txt s3://lee-static-web-sre-state-storage/dev/test.txt
        continue-on-error: true

      - name: S3API test(head-object)
        id: head-object-2
        run: aws s3api head-object --bucket lee-static-web-sre-state-storage --key dev/test.txt
        continue-on-error: true

      - name: Copy 'test.txt'
        id: s3-cp_text
        run: aws s3 cp s3://lee-static-web-sre-state-storage/dev/test.txt .
        continue-on-error: true
      # Terraform 작업
      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: "1.15.4"

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      # - name: Terraform Validate
      #   id: validate
      #   run: terraform init -no-color

      # - name: Terraform Plan
      #   id: plan
      #   run: terraform plan -out put_object -no-color -input=false
      #   continue-on-error: true

      # - name: Terraform Apply
      #   id: Apply
      #   run: terraform apply put_object
      #   continue-on-error: true
