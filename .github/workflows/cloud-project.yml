name: Test

on:
  push:
    branches:
      - dev
    paths:
      - 'aws/2026/05/static-web-sre/src/environments/dev/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ROLE_ARN: arn:aws:iam::345003923266:role/github_action-dev_branch

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      # Git 저장소 가져오기
      - name: Checkout repository
        uses: actions/checkout@v7

      # 현재 사용중인 IAM Role 보여주기
      - name: Show IAM Role
        uses: ./.github/actions/show-iam-role
        with:
          role-arn: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}