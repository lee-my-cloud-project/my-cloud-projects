name: Show Current IAM Role

description: Show currnetly used IAM Role

inputs:
  role-arn:
    description: AWS IAM Role to use
    required: true
  aws-region:
    description: AWS Geo-logical Region
    required: true

runs:
  using: "composite"
  steps:
    # AWS IAM Role Assume
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6.2.1
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}

    # 현재 사용 중인 IAM Role 확인
    - name: Show IAM Role
      shell: bash
      run: |
        aws sts get-caller-identity